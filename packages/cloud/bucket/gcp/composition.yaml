apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: bucket-gcp
  labels:
    provider: gcp
spec:
  compositeTypeRef:
    apiVersion: cloud.example.org/v1alpha1
    kind: Bucket
  mode: Pipeline
  pipeline:
    - step: render
      functionRef:
        name: function-kcl
      input:
        apiVersion: krm.kcl.dev/v1alpha1
        kind: KCLInput
        spec:
          # Pin a release with ?tag=<version> once published via `nx release`.
          source: oci://docker.io/yurikrupnik/bucket-gcp?tag=0.0.6
    - step: ready
      functionRef:
        name: function-auto-ready
