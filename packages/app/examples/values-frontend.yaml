# Frontend app values (Helm-style) → app.Workload. Same archetype as backend,
# different field values: no prometheus, nginx volumes, non-root uid/gid 101.
name: zerg-web
namespace: zerg
component: frontend
image: yurikrupnik/zerg-web
port: 8080
runAsUser: 101
runAsGroup: 101
prometheus: false
startupProbe:
  type: http
  path: /health
  port: http
  initialDelaySeconds: 2
  periodSeconds: 5
  failureThreshold: 4
  timeoutSeconds: 3
livenessProbe:
  type: http
  path: /health
  port: http
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 3
readinessProbe:
  type: http
  path: /health
  port: http
  periodSeconds: 5
  failureThreshold: 3
  timeoutSeconds: 2
resources:
  requests:
    memory: 32Mi
    cpu: 50m
  limits:
    memory: 64Mi
    cpu: 100m
env:
  - name: UPSTREAM_HOST
    configMapName: proxy-envs
    configMapKey: upstream_host
  - name: UPSTREAM_PORT
    configMapName: proxy-envs
    configMapKey: upstream_port
  - name: UPSTREAM_NAME
    configMapName: proxy-envs
    configMapKey: upstream_name
volumeMounts:
  - name: nginx-conf-d
    mountPath: /etc/nginx/conf.d
  - name: nginx-cache
    mountPath: /var/cache/nginx
  - name: nginx-run
    mountPath: /var/run
  - name: tmp
    mountPath: /tmp
volumes:
  - name: nginx-conf-d
    emptyDir: {}
  - name: nginx-cache
    emptyDir: {}
  - name: nginx-run
    emptyDir: {}
  - name: tmp
    emptyDir: {}
terminationGracePeriodSeconds: 10
