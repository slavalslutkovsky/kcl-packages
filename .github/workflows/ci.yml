name: CI

# Validates every KCL package (build + test + lint) on pull requests and
# pushes to main. The publish workflow gates on these same targets, so a
# broken package can never be published.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  actions: read # nrwl/nx-set-shas reads recent workflow runs to derive the base SHA
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so nx affected can diff against the base SHA

      - name: Derive SHAs for nx affected
        uses: nrwl/nx-set-shas@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install KCL CLI
        run: curl -fsSL https://kcl-lang.io/script/install-cli.sh | bash

      - name: Build, test and lint
        run: pnpm exec nx affected -t build test lint
